# Pre-commit configuration for sensors repository.
# Defines formatting and linting hook policies.

exclude: '^(brew-logs/|solar_sensor/|auth/)'

repos:
  - repo: https://github.com/google/yapf
    rev: v0.43.0
    hooks:
      - id: yapf
        args: [--style, '{based_on_style: google, indent_width: 2, column_limit: 80}']

  - repo: https://github.com/PyCQA/isort
    rev: 8.0.0
    hooks:
      - id: isort
        args: [--profile, google]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
